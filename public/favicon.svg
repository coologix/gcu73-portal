<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Graduation cap icon in maroon on transparent background -->
  <g transform="translate(16, 13)" fill="#6B1D1D">
    <!-- Cap board (diamond/rhombus shape) -->
    <polygon points="0,-10 14,-3 0,4 -14,-3"/>
    <!-- Cap base/band -->
    <path d="M-8,1 L-8,7 Q0,12 8,7 L8,1 Q0,5 -8,1 Z" opacity="0.85"/>
    <!-- Tassel string -->
    <line x1="14" y1="-3" x2="16" y2="8" stroke="#6B1D1D" stroke-width="1.2"/>
    <!-- Tassel end -->
    <circle cx="16" cy="9" r="1.5" fill="#6B1D1D"/>
    <rect x="14.5" y="9" width="3" height="4" rx="0.8" fill="#6B1D1D"/>
  </g>
</svg>
